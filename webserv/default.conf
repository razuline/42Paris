# Main server configuration
server
{
	listen                  4242;
	server_name             localhost;
	root                    ./www;
	index                   index.html;
	client_max_body_size    1048576; # 1 MB limit

	# Default error page routing
	error_page 404          errors/404.html;

	# ==========================================================================
	# 🚨 TESTER REQUIREMENTS (MANDATORY ROUTES FOR EVALUATION)
	# ==========================================================================

	# 1. Root route - GET requests ONLY
	location /
	{
		allow_methods       GET;
		root                ./www;
		index               index.html;
	}

	# 2. /directory/ route using YoupiBanane as root and youpi.bad_extension as default index
	location /directory
	{
		allow_methods       GET;
		root                ./YoupiBanane;
		index               youpi.bad_extension;
	}

	# 3. /post_body route with client max body size limited strictly to 100 bytes
	location /post_body
	{
		allow_methods       POST;
		client_max_body_size 100;
	}

	# 4. CGI rule handling any .bla extension file via POST requests using cgi_tester
	location .bla
	{
		allow_methods       POST;
		cgi_path            ./cgi_tester;
	}

	# ==========================================================================
	# 💾 PREVIOUS USER ROUTES (PRESERVED FOR COMPATIBILITY)
	# ==========================================================================

	location /static
	{
		allow_methods       GET;
		root                ./www/assets;
	}

	location /files
	{
		allow_methods       GET;
		autoindex           on;
	}

	location /upload
	{
		allow_methods       POST;
		upload_store        ./www/uploads;
	}

	location /old-page
	{
		return              http://localhost:4242/new-page;
	}
}