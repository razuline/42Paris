server {
    listen 4242;
    server_name localhost;
    root ./www;
    index index.html;
    client_max_body_size 100000000;

    location / {
        allow_methods GET;
        index index.html;
    }

    location /directory {
        allow_methods GET POST;
        root ./YoupiBanane;
        index youpi.bad_extension;
    }

    location /post_body {
        allow_methods POST;
        client_max_body_size 100;
    }

    location .bla {
        allow_methods POST GET;
        cgi_path ./cgi_test;
    }

    # ADD THIS for Python CGI
    location .py {
        allow_methods GET POST;
        cgi_path /usr/bin/python3;
    }
}