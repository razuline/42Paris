# Main server configuration
server
{
	listen                  4242;
	server_name             localhost;
	root                    ./www;
	index                   index.html;
	client_max_body_size    1048576; # 1 MB limit

	# Default error page routing
	error_page 404          errors/404.html;

	# Route block for static assets
	location /static
	{
		allowed_methods     GET;
		root                ./www/assets;
	}

	# Route block with Autoindex enabled
	location /files
	{
		allowed_methods     GET;
		autoindex           on;
	}

	# Route block handling file uploads
	location /upload
	{
		allowed_methods     POST;
		upload_store        ./www/uploads;
	}

	# HTTP Redirection rule (301)
	location /old-page
	{
		return              http://localhost:4242/new-page;
	}
}